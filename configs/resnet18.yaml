# ResNet18 pretrained (ImageNet); fine-tuning usually gives higher accuracy than the small CNN
model:
  name: resnet18
  num_classes: null
  dropout: 0.3
  pretrained: true

data:
  data_dir: data/processed
  splits_dir: data/splits
  image_size: 224
  train_batch_size: 32
  val_batch_size: 64
  num_workers: 0

train:
  epochs: 60
  lr: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  early_stop_patience: 5
  seed: 42

paths:
  checkpoint_dir: checkpoints
  runs_dir: runs
  reports_dir: reports
