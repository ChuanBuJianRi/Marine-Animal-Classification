# AlexNet (Krizhevsky, Sutskever, Hinton, 2012), pretrained on ImageNet
model:
  name: alexnet
  num_classes: null
  dropout: 0.5
  pretrained: true

# Data
data:
  data_dir: data/processed
  splits_dir: data/splits
  image_size: 224
  train_batch_size: 32
  val_batch_size: 64
  num_workers: 0

# Training (fine-tuning: slightly lower lr)
train:
  epochs: 60
  lr: 1.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine
  early_stop_patience: 5
  seed: 42

# Paths
paths:
  checkpoint_dir: checkpoints
  runs_dir: runs
  reports_dir: reports
